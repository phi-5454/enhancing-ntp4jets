_target_: gabbro.models.vqvae.VQVAELightning

model_type: "VQVAETransformer"
max_validation_plot_batches: 1
max_test_plot_batches: null

model_kwargs:
  hidden_dim: 128
  latent_dim: 16
  num_blocks: 3
  num_heads: 8
  alpha: 5
  old_transformer_implementation: false
  vq_kwargs:
    num_codes: 2048
    beta: 0.9
    kmeans_init: true
    norm: null
    cb_norm: null
    affine_lr: 0.0
    sync_nu: 2
    replace_freq: 20
    dim: -1
    rotation_tr: False

  # mode: "vq" uses the single VectorQuant layer.
  # mode: "split" uses Phi -> branch quantizers -> Psi.
  split_quantizer_cfg:
    mode: split
    branch_order: ["mu", "alpha"]

    # Backward-compatible default for both branches. Branch-specific overrides
    # below may be "fsq" or "vq".
    quantizer: fsq
    mu_quantizer: null
    alpha_quantizer: null

    # Phi and Psi are projection adapters around NormFormer stacks. The MLP
    # expansion factor is shared by both directions.
    projection_hidden_dim: 16
    num_heads: 1
    num_blocks: 1
    mlp_expansion_factor: 4
    dropout_rate: 0.0

    fsq_mu_levels: [15, 15, 15]
    #fsq_mu_levels: [5, 4, 4, 3, 3, 3, 2, 2]
    fsq_alpha_levels: [1024]

    vq_mu_dim: 8
    vq_mu_num_codes: 512
    vq_alpha_dim: 1
    vq_alpha_num_codes: 1024
    vq_kwargs:
      beta: 0.95
      kmeans_init: false
      norm: null
      cb_norm: null
      affine_lr: 0.0
      sync_nu: 0.0
      replace_freq: 0
      dim: -1
      rotation_tr: False

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.001

scheduler:
  _target_: torch.optim.lr_scheduler.ConstantLR
  _partial_: true

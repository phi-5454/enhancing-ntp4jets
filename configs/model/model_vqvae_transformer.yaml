_target_: gabbro.models.vqvae.VQVAELightning

model_type: "VQVAETransformer"
max_validation_plot_batches: 1
max_test_plot_batches: null

model_kwargs:
  hidden_dim: 128
  latent_dim: 8
  num_blocks: 4
  num_heads: 8
  alpha: 10
  reconstruction_loss: l2
  causal_decoder: true
  old_transformer_implementation: false
  transformer_cfg:
    attn_cfg:
      num_heads: ${model.model_kwargs.num_heads}
      dropout_rate: 0.0
      norm_before: true
      norm_after: false
    mlp_cfg:
      expansion_factor: 4
      dropout_rate: 0.0
      norm_before: true
      activation: GELU
    residual_cfg:
      gate_type: local
      init_value: 1.0
  vq_kwargs:
    num_codes: 512
    beta: 0.9
    kmeans_init: false
    norm: null
    cb_norm: null
    affine_lr: 2.0
    sync_nu: 1
    replace_freq: 500
    dim: -1
    rotation_tr: False
  split_quantizer_cfg: null

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0005
  weight_decay: 0.01

scheduler:
  _target_: gabbro.schedulers.lr_scheduler.OneCycleCooldown
  _partial_: true
  warmup: 4
  cooldown: 20
  cooldown_final: 6
  initial_lr: 0.0005
  max_lr: 0.001
  final_lr: 0.0003

scheduler_lightning_kwargs:
  interval: epoch
  frequency: 1

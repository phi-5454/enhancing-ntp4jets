# @package _global_

defaults:
  - override /feature_dict: feature_dict_orbit_jet_puppi_ak8_absolute.yaml
  - override /data: orbit_jet_parquet.yaml
  - override /model: model_vqvae_transformer.yaml
  - override /callbacks: orbit_plotting_callbacks.yaml
  - override /logger: csv.yaml        # swap to wandb.yaml when ready
  - override /trainer: gpu.yaml
  - _self_

project_name: "orbit-jet-puppi-ak8"
tags: ["orbit", "jet-puppi-ak8", "production"]

train: true
test: false    # test phase requires a checkpoint; run separately once ngt setup is confirmed

data:
  batch_size: 256
  num_workers: 4
  # Per-class manifests generated by scripts/make_eos_manifests.py.
  # Set ORBIT_MANIFEST_DIR before launching (e.g. export ORBIT_MANIFEST_DIR=/path/to/manifests).
  parquet_files_train_val_per_class:
    ggHbb:         ${oc.env:ORBIT_MANIFEST_DIR}/ggHbb.txt
    QCD_HT50toInf: ${oc.env:ORBIT_MANIFEST_DIR}/QCD_HT50toInf.txt
    VBFHbb:        ${oc.env:ORBIT_MANIFEST_DIR}/VBFHbb.txt
    minbias:       ${oc.env:ORBIT_MANIFEST_DIR}/minbias.txt
  # parquet_files_test left empty; fill in when a held-out test directory is decided.

trainer:
  max_epochs: 100
  enable_checkpointing: true

# model_vqvae_transformer.yaml provides production defaults:
# hidden_dim=128, latent_dim=8, num_blocks=4, num_heads=8, codebook=512, causal_decoder=true.
# To use the split quantizer instead, pass: model=model_vqvae_transformer_split

extras:
  enforce_tags: false
  print_config: true

# @package _global_

defaults:
  - orbit_jet_puppi_ak8_ggHbb_minbias
  - override /logger: wandb.yaml
  - override /trainer: cpu.yaml
  - _self_

task_name: orbit_particle_ggHbb_minbias_wandb_smoke
tags: ["orbit", "particle", "ggHbb", "minbias", "wandb-smoke"]

trainer:
  max_epochs: 1
  num_sanity_val_steps: 0
  limit_train_batches: null
  limit_val_batches: null
  limit_test_batches: null
  enable_checkpointing: true

data:
  batch_size: 2
  num_workers: 0
  parquet_files_train_val_per_class:
    ggHbb:
      max_train_events: 10
      max_val_events: 10
    minbias:
      max_train_events: 10
      max_val_events: 10
  parquet_files_test_per_class:
    ggHbb:
      max_test_events: 10
    minbias:
      max_test_events: 10

model:
  max_validation_plot_batches: null
  max_test_plot_batches: null

logger:
  wandb:
    project: orbit-tokenizer
    group: wandb_logging_smoke
    name: ${task_name}
